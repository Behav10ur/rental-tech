<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Аренда спецтехники{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 24px;
           max-width: 900px; margin-inline: auto; line-height: 1.5; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .photo { height: 180px; background: #f2f2f2; display: flex; align-items: center;
             justify-content: center; color: #999; border-radius: 8px; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; }
    .muted { color: #777; }
    label { display: block; font-size: 14px; color: #777; margin: 12px 0 4px; }
    input[type=text], input[type=tel], input[type=date], input[type=time] {
      width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
    button { width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #111;
             color: #fff; font-size: 14px; cursor: pointer; margin-top: 16px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-link { display: block; text-align: center; background: #111; color: #fff;
                padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 12px; }
    .error { color: #c00; font-size: 14px; margin-top: 12px; }
    .success { color: #080; font-size: 14px; margin-top: 12px; }
    .calc { background: #f7f7f7; border-radius: 8px; padding: 12px; margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
